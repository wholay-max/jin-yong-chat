<!DOCTYPE html>

<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金庸群侠聊天室</title>
    <style>
        /* ===== 全局样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            background: #1a0a00;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* gzhi== */
        .app-container {
            width: 1200px;
            max-width: 100%;
            height: 90vh;
            display: flex;
            gap: 16px;
            background: linear-gradient(135deg, #2a1a0a 0%, #1a0a00 100%);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 0 60px rgba(200, 150, 50, 0.15), inset 0 0 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(200, 150, 50, 0.2);
        }

        /* ===== 左侧面板 - 角色列表 ===== */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: rgba(30, 15, 5, 0.8);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(200, 150, 50, 0.15);
        }

        .sidebar-title {
            color: #d4a84b;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(200, 150, 50, 0.2);
            margin-bottom: 12px;
            text-shadow: 0 0 10px rgba(200, 150, 50, 0.3);
            letter-spacing: 4px;
        }

        .character-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .character-list::-webkit-scrollbar {
            width: 4px;
        }
        .character-list::-webkit-scrollbar-thumb {
            background: rgba(200, 150, 50, 0.3);
            border-radius: 2px;
        }

        .character-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(50, 30, 15, 0.5);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
            user-select: none;
        }
        .character-card:hover {
            background: rgba(70, 45, 25, 0.6);
            border-color: rgba(200, 150, 50, 0.3);
        }
        .character-card.selected {
            background: rgba(80, 55, 30, 0.7);
            border-color: #d4a84b;
            box-shadow: 0 0 15px rgba(200, 150, 50, 0.15);
        }

        .character-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            border: 2px solid rgba(200, 150, 50, 0.3);
        }

        .character-info {
            flex: 1;
            min-width: 0;
        }
        .character-name {
            color: #e8d5a0;
            font-size: 14px;
            font-weight: bold;
        }
        .character-title {
            color: #a08060;
            font-size: 11px;
            margin-top: 2px;
        }

        .character-checkbox {
            width: 18px;
            height: 18px;
            accent-color: #d4a84b;
            cursor: pointer;
        }

        .sidebar-actions {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(200, 150, 50, 0.2);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #d4a84b, #b8860b);
            color: #1a0a00;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(200, 150, 50, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: linear-gradient(135deg, #8b3a3a, #5c1a1a);
            color: #e8d5a0;
        }
        .btn-danger:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(139, 58, 58, 0.3);
        }

        .btn-secondary {
            background: rgba(80, 55, 30, 0.6);
            color: #d4a84b;
            border: 1px solid rgba(200, 150, 50, 0.2);
        }
        .btn-secondary:hover {
            background: rgba(100, 70, 40, 0.7);
        }

        /* ===== 右侧主区域 ===== */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 0;
        }

        /* ===== 聊天头部 ===== */
        .chat-header {
            background: rgba(30, 15, 5, 0.8);
            border-radius: 14px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(200, 150, 50, 0.15);
        }

        .chat-header-title {
            color: #d4a84b;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header-title .icon {
            font-size: 22px;
        }

        .chat-status {
            color: #a08060;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .chat-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .chat-status .dot.online {
            background: #4caf50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.5);
        }
        .chat-status .dot.offline {
            background: #666;
        }
        .chat-status .dot.thinking {
            background: #d4a84b;
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* ===== 聊天消息区域 ===== */
        .chat-messages {
            flex: 1;
            background: rgba(20, 10, 5, 0.6);
            border-radius: 14px;
            padding: 20px;
            overflow-y: auto;
            border: 1px solid rgba(200, 150, 50, 0.1);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(200, 150, 50, 0.2);
            border-radius: 2px;
        }

        /* ===== 消息气泡 ===== */
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            border: 2px solid rgba(200, 150, 50, 0.3);
        }

        .message-content {
            background: rgba(40, 25, 12, 0.8);
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid rgba(200, 150, 50, 0.1);
        }

        .message.user .message-content {
            background: rgba(60, 40, 20, 0.8);
            border-color: rgba(200, 150, 50, 0.2);
        }

        .message-name {
            color: #d4a84b;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .message.user .message-name {
            color: #e8c86a;
        }

        .message-text {
            color: #e0d0b8;
            font-size: 14px;
            line-height: 1.7;
            word-break: break-word;
        }

        .message-time {
            color: #6a5a4a;
            font-size: 11px;
            margin-top: 6px;
            text-align: right;
        }

        /* ===== 系统消息 ===== */
        .message.system {
            align-self: center;
            max-width: 100%;
        }
        .message.system .message-content {
            background: rgba(30, 20, 10, 0.6);
            border-color: rgba(200, 150, 50, 0.1);
            text-align: center;
            padding: 8px 20px;
        }
        .message.system .message-text {
            color: #a08060;
            font-size: 13px;
        }

        /* ===== 输入区域 ===== */
        .chat-input-area {
            background: rgba(30, 15, 5, 0.8);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            border: 1px solid rgba(200, 150, 50, 0.15);
        }

        .chat-input {
            flex: 1;
            background: rgba(20, 10, 5, 0.6);
            border: 1px solid rgba(200, 150, 50, 0.15);
            border-radius: 8px;
            padding: 10px 14px;
            color: #e0d0b8;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 42px;
            max-height: 120px;
            transition: border-color 0.3s;
        }
        .chat-input:focus {
            border-color: rgba(200, 150, 50, 0.4);
        }
        .chat-input::placeholder {
            color: #6a5a4a;
        }

        .btn-send {
            padding: 10px 24px;
            background: linear-gradient(135deg, #d4a84b, #b8860b);
            color: #1a0a00;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            white-space: nowrap;
        }
        .btn-send:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(200, 150, 50, 0.3);
        }
        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== 回合计数器 ===== */
        .round-counter {
            color: #a08060;
            font-size: 12px;
            text-align: center;
            padding: 4px;
        }

        /* ===== 手机端 - 角色选择面板（底部弹出） ===== */
        .mobile-char-btn {
            display: none;
        }
        
        .mobile-char-overlay {
            display: none;
        }

        /* ===== 响应式 - 手机端 ===== */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }
            .app-container {
                flex-direction: column;
                height: 100vh;
                width: 100%;
                border-radius: 0;
                padding: 8px;
                gap: 8px;
                border: none;
            }
            
            /* 手机端隐藏侧栏，用底部弹出面板代替 */
            .sidebar {
                display: none;
            }
            
            /* 手机端顶部工具栏 */
            .mobile-char-btn {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 8px 14px;
                background: rgba(80, 55, 30, 0.6);
                color: #d4a84b;
                border: 1px solid rgba(200, 150, 50, 0.2);
                border-radius: 8px;
                font-size: 13px;
                font-weight: bold;
                cursor: pointer;
                font-family: inherit;
                white-space: nowrap;
            }
            .mobile-char-btn:active {
                background: rgba(100, 70, 40, 0.7);
            }
            
            /* 手机端底部弹出角色面板 */
            .mobile-char-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.6);
                z-index: 999;
                justify-content: flex-end;
                align-items: flex-end;
            }
            .mobile-char-overlay.active {
                display: flex;
            }
            .mobile-char-panel {
                background: linear-gradient(180deg, #2a1a0a, #1a0a00);
                border-radius: 20px 20px 0 0;
                padding: 16px 16px 30px;
                width: 100%;
                max-height: 70vh;
                border-top: 1px solid rgba(200, 150, 50, 0.2);
                animation: slideUp 0.3s ease;
                display: flex;
                flex-direction: column;
            }
            @keyframes slideUp {
                from { transform: translateY(100%); }
                to { transform: translateY(0); }
            }
            .mobile-char-panel .panel-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding-bottom: 12px;
                border-bottom: 1px solid rgba(200, 150, 50, 0.15);
                margin-bottom: 12px;
            }
            .mobile-char-panel .panel-title {
                color: #d4a84b;
                font-size: 16px;
                font-weight: bold;
            }
            .mobile-char-panel .panel-close {
                color: #a08060;
                font-size: 22px;
                cursor: pointer;
                padding: 4px 8px;
                background: none;
                border: none;
                font-family: inherit;
            }
            .mobile-char-panel .character-list {
                flex: 1;
                overflow-y: auto;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .mobile-char-panel .character-card {
                padding: 8px 10px;
            }
            .mobile-char-panel .character-avatar {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }
            .mobile-char-panel .character-name {
                font-size: 12px;
            }
            .mobile-char-panel .character-title {
                font-size: 10px;
            }
            .mobile-char-panel .character-checkbox {
                width: 16px;
                height: 16px;
            }
            .mobile-char-panel .panel-actions {
                display: flex;
                gap: 8px;
                margin-top: 12px;
                padding-top: 12px;
                border-top: 1px solid rgba(200, 150, 50, 0.15);
            }
            .mobile-char-panel .panel-actions .btn {
                flex: 1;
                font-size: 13px;
                padding: 10px;
            }
            
            /* 手机端工具栏 - 在手机宽度时显示 */
            .mobile-toolbar {
                display: flex !important;
                gap: 6px;
                align-items: center;
                flex-wrap: wrap;
            }

            
            /* 聊天头部手机适配 - 精简布局 */
            .chat-header {
                padding: 6px 10px;
                border-radius: 8px;
                flex-wrap: wrap;
                gap: 4px;
            }
            .chat-header-title {
                font-size: 13px;
            }
            .chat-header-title .icon {
                font-size: 16px;
            }
            .chat-status {
                font-size: 10px;
                gap: 3px;
            }
            #modeBadge {
                font-size: 9px !important;
                padding: 1px 4px !important;
                margin-left: 3px !important;
            }
            #statusText {
                font-size: 10px;
            }
            
            /* 手机端工具栏 - 紧凑排列 */
            .mobile-toolbar {
                display: flex !important;
                gap: 4px;
                align-items: center;
                flex-wrap: nowrap;
                width: 100%;
                justify-content: flex-start;
                padding-top: 4px;
                border-top: 1px solid rgba(200,150,50,0.1);
                margin-top: 2px;
            }
            .mobile-char-btn {
                padding: 5px 8px;
                font-size: 11px;
                gap: 3px;
            }
            .mobile-toolbar .btn {
                padding: 5px 8px !important;
                font-size: 11px !important;
                flex-shrink: 0;
            }
            .mobile-toolbar .btn-primary,
            .mobile-toolbar .btn-danger,
            .mobile-toolbar .btn-secondary {
                padding: 5px 8px !important;
                font-size: 11px !important;
            }
            
            /* 手机端按钮点击反馈 */
            .mobile-toolbar .btn:active,
            .mobile-char-btn:active {
                transform: scale(0.92) !important;
                transition: transform 0.1s ease !important;
            }
            .mobile-toolbar .btn-primary:active {
                box-shadow: 0 0 20px rgba(200,150,50,0.5) !important;
            }
            .mobile-toolbar .btn-danger:active {
                box-shadow: 0 0 20px rgba(139,58,58,0.5) !important;
            }
            .mobile-toolbar .btn-secondary:active {
                box-shadow: 0 0 15px rgba(200,150,50,0.3) !important;
            }


            
            /* 聊天区域手机适配 */
            .chat-messages {
                padding: 12px;
                border-radius: 10px;
                gap: 10px;
            }
            .message {
                max-width: 98%;
                gap: 8px;
            }
            .message-avatar {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }
            .message-content {
                padding: 10px 12px;
                border-radius: 10px;
            }
            .message-text {
                font-size: 13px;
                line-height: 1.6;
            }
            .message-name {
                font-size: 11px;
            }
            .message-time {
                font-size: 10px;
            }
            
            /* 输入区域手机适配 */
            .chat-input-area {
                padding: 8px 10px;
                border-radius: 10px;
                gap: 8px;
            }
            .chat-input {
                font-size: 13px;
                padding: 8px 12px;
                min-height: 36px;
            }
            .btn-send {
                padding: 8px 16px;
                font-size: 13px;
            }
            
            /* 按钮手机适配 */
            .btn {
                padding: 8px 12px;
                font-size: 12px;
            }
            
            /* 回合计数器 */
            .round-counter {
                font-size: 11px;
            }
            
            /* 设置弹窗手机适配 */
            .modal {
                padding: 20px;
                width: 95%;
            }
            .modal-title {
                font-size: 17px;
            }
        }


        /* ===== 打字指示器 ===== */
        .typing-indicator {
            align-self: flex-start;
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 8px 0;
            animation: fadeIn 0.3s ease;
        }
        .typing-indicator .message-avatar {
            width: 36px;
            height: 36px;
            font-size: 18px;
        }
        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 8px 16px;
            background: rgba(40, 25, 12, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(200, 150, 50, 0.1);
        }
        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #d4a84b;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* ===== 设置弹窗 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: linear-gradient(135deg, #2a1a0a, #1a0a00);
            border-radius: 16px;
            padding: 30px;
            width: 480px;
            max-width: 90%;
            border: 1px solid rgba(200, 150, 50, 0.2);
            box-shadow: 0 0 60px rgba(200, 150, 50, 0.1);
        }

        .modal-title {
            color: #d4a84b;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .modal-field {
            margin-bottom: 16px;
        }
        .modal-field label {
            display: block;
            color: #a08060;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .modal-field input, .modal-field select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(20, 10, 5, 0.6);
            border: 1px solid rgba(200, 150, 50, 0.15);
            border-radius: 8px;
            color: #e0d0b8;
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }
        .modal-field input:focus, .modal-field select:focus {
            border-color: rgba(200, 150, 50, 0.4);
        }
        .modal-field input::placeholder {
            color: #6a5a4a;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-actions .btn {
            flex: 1;
        }

        .modal-hint {
            color: #6a5a4a;
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            line-height: 1.6;
        }
        .modal-hint a {
            color: #d4a84b;
            text-decoration: none;
        }
        .modal-hint a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 左侧面板 -->
    <div class="sidebar">
        <div class="sidebar-title">🏯 群侠录</div>
        <div class="character-list" id="characterList"></div>
        <div class="sidebar-actions">
            <button class="btn btn-primary" id="btnStartChat" onclick="startChat()">🗣️ 开始论剑</button>
            <button class="btn btn-danger" id="btnStopChat" onclick="stopChat()" disabled>🛑 结束论剑</button>
            <button class="btn btn-secondary" onclick="showSettings()">⚙️ 设置</button>
            <button class="btn btn-secondary" id="btnExport" disabled style="font-size:13px;">📥 导出论剑录</button>

        </div>

    </div>

    <!-- 手机端底部弹出角色选择面板 -->
    <div class="mobile-char-overlay" id="mobileCharOverlay">
        <div class="mobile-char-panel">
            <div class="panel-header">
                <span class="panel-title">🏯 群侠录</span>
                <button class="panel-close" onclick="closeMobileCharPanel()">✕</button>
            </div>
            <div class="character-list" id="mobileCharacterList"></div>
            <div class="panel-actions">
                <button class="btn btn-primary" onclick="closeMobileCharPanel()">确定</button>
            </div>
        </div>
    </div>

    <!-- 右侧主区域 -->
    <div class="main-area">

    // ============================================================
    // 初始化
    // ============================================================
    function init() {
        renderCharacterList();
        loadSettings();
        setupEventListeners();
    }

    function renderCharacterList() {
        const container = document.getElementById('characterList');
        container.innerHTML = '';
        CHARACTERS.forEach(char => {
            const card = document.createElement('div');
            card.className = 'character-card';
            card.dataset.id = char.id;
            card.innerHTML = `
                <div class="character-avatar" style="background: ${char.color}33; border-color: ${char.color}66;">
                    ${char.emoji}
                </div>
                <div class="character-info">
                    <div class="character-name">${char.name}</div>
                    <div class="character-title">${char.title}</div>
                </div>
                <input type="checkbox" class="character-checkbox" data-id="${char.id}">
            `;
            card.addEventListener('click', (e) => {
                if (e.target.type !== 'checkbox') {
                    const checkbox = card.querySelector('.character-checkbox');
                    checkbox.checked = !checkbox.checked;
                    checkbox.dispatchEvent(new Event('change'));
                }
            });
            const checkbox = card.querySelector('.character-checkbox');
            checkbox.addEventListener('change', () => {
                card.classList.toggle('selected', checkbox.checked);
                updateSelectedCharacters();
            });
            container.appendChild(card);
        });
    }

    function updateSelectedCharacters() {
        const checkboxes = document.querySelectorAll('.character-checkbox:checked');
        state.selectedCharacters = Array.from(checkboxes).map(cb => {
            const id = cb.dataset.id;
            return CHARACTERS.find(c => c.id === id);
        });
        const btnStart = document.getElementById('btnStartChat');
        const mobileBtnStart = document.getElementById('mobileBtnStart');
        const disabled = state.selectedCharacters.length < 2 || state.isChatting;
        btnStart.disabled = disabled;
        if (mobileBtnStart) mobileBtnStart.disabled = disabled;
    }


    function setupEventListeners() {
        // 输入框自动调整高度
        const input = document.getElementById('chatInput');
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 120) + 'px';
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendUserMessage();
            }
        });
        
        // 导出按钮事件绑定
        document.getElementById('btnExport').addEventListener('click', function() {
            exportChat();
        });



    }


    // ============================================================
    // 设置管理 - 自动检测服务器模式
    // ============================================================
    // 自动检测基础路径（适配 Nginx 反向代理子路径）
    function getBasePath() {
        const path = window.location.pathname;
        // 如果路径包含 /jin-yong-chat/，说明是通过 Nginx 反代访问
        if (path.includes('/jin-yong-chat/')) {
            return '/jin-yong-chat';
        }
        return '';
    }

    async function checkServerMode() {
        try {
            const basePath = getBasePath();
            const response = await fetch(basePath + '/api/config');

            if (response.ok) {
                const config = await response.json();
                state.serverMode = config.hasApiKey ? 'online' : 'offline';
                updateServerModeDisplay();
                return true;
            }
        } catch (e) {
            // 后端不可用，使用离线模式
            console.log('后端服务不可用，使用离线模式');
        }
        state.serverMode = 'offline';
        updateServerModeDisplay();
        return false;
    }

    function updateServerModeDisplay() {
        const textEl = document.getElementById('serverModeText');
        const badgeEl = document.getElementById('modeBadge');
        if (state.serverMode === 'online') {
            textEl.innerHTML = '🌐 <strong style="color:#4caf50;">在线模式</strong><br><span style="font-size:12px;color:#a08060;">AI 驱动，对话更智能</span>';
            badgeEl.textContent = '🌐 在线';
            badgeEl.style.background = 'rgba(76,175,80,0.15)';
            badgeEl.style.color = '#4caf50';
            badgeEl.style.borderColor = 'rgba(76,175,80,0.3)';
        } else if (state.serverMode === 'offline') {
            textEl.innerHTML = '📜 <strong style="color:#d4a84b;">离线模式</strong><br><span style="font-size:12px;color:#a08060;">预设台词，无需 API Key</span>';
            badgeEl.textContent = '📜 离线';
            badgeEl.style.background = 'rgba(200,150,50,0.15)';
            badgeEl.style.color = '#a08060';
            badgeEl.style.borderColor = 'rgba(200,150,50,0.1)';
        } else {
            textEl.innerHTML = '⏳ 检测服务器配置中...';
            badgeEl.textContent = '⏳ 检测中';
            badgeEl.style.background = 'rgba(200,150,50,0.15)';
            badgeEl.style.color = '#a08060';
            badgeEl.style.borderColor = 'rgba(200,150,50,0.1)';
        }
    }


    function loadSettings() {
        const saved = localStorage.getItem('jinyongChatSettings');
        if (saved) {
            try {
                const settings = JSON.parse(saved);
                state.maxRounds = settings.maxRounds || state.maxRounds;
                document.getElementById('maxRounds').value = state.maxRounds;
            } catch (e) {}
        }
        // 异步检测服务器模式
        checkServerMode();
    }

    function saveSettings() {
        state.maxRounds = parseInt(document.getElementById('maxRounds').value);
        localStorage.setItem('jinyongChatSettings', JSON.stringify({
            maxRounds: state.maxRounds
        }));
        closeSettings();
        addSystemMessage('⚙️ 江湖设置已更新！');
    }

    function showSettings() {
        document.getElementById('settingsModal').classList.add('active');
        // 每次打开设置时重新检测服务器状态
        checkServerMode();
    }

    function closeSettings() {
        document.getElementById('settingsModal').classList.remove('active');
    }



    // ============================================================
    // 聊天核心功能
    // ============================================================
    function addMessage(char, text) {
        const container = document.getElementById('chatMessages');
        const msg = document.createElement('div');
        msg.className = 'message';
        if (char.id === 'user') {
            msg.classList.add('user');
        }
        msg.innerHTML = `
            <div class="message-avatar" style="background: ${char.color || '#6a5a4a'}33; border-color: ${char.color || '#6a5a4a'}66;">
                ${char.emoji || '🧑'}
            </div>
            <div class="message-content">
                <div class="message-name">${char.name || '我'}</div>
                <div class="message-text">${text}</div>
                <div class="message-time">${new Date().toLocaleTimeString()}</div>
            </div>
        `;
        container.appendChild(msg);
        container.scrollTop = container.scrollHeight;
        
        state.messages.push({ char, text, time: new Date().toISOString() });
    }

    function addSystemMessage(text) {
        const container = document.getElementById('chatMessages');
        const msg = document.createElement('div');
        msg.className = 'message system';
        msg.innerHTML = `
            <div class="message-content">
                <div class="message-text">${text}</div>
            </div>
        `;
        container.appendChild(msg);
        container.scrollTop = container.scrollHeight;
    }

    function showTypingIndicator(char) {
        const container = document.getElementById('chatMessages');
        const indicator = document.createElement('div');
        indicator.className = 'typing-indicator';
        indicator.id = 'typingIndicator';
        indicator.innerHTML = `
            <div class="message-avatar" style="background: ${char.color}33; border-color: ${char.color}66;">
                ${char.emoji}
            </div>
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
        `;
        container.appendChild(indicator);
        container.scrollTop = container.scrollHeight;
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    function setStatus(mode, text) {
        const dot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        dot.className = 'dot ' + mode;
        statusText.textContent = text;
    }

    function updateRoundCounter() {
        document.getElementById('roundCounter').textContent = `回合 ${state.currentRound} / ${state.maxRounds}`;
    }

    function setInputEnabled(enabled) {
        document.getElementById('chatInput').disabled = !enabled;
        document.getElementById('btnSend').disabled = !enabled;
        if (enabled) {
            document.getElementById('chatInput').focus();
        }
    }

    // ============================================================
    // 开始 / 停止聊天
    // ============================================================
    async function startChat() {
        if (state.selectedCharacters.length < 2) {
            addSystemMessage('⚠️ 至少需要选择两位大侠才能开始论剑！');
            return;
        }

        // 检测服务器模式（如果还没检测到）
        if (state.serverMode === 'checking') {
            await checkServerMode();
        }

        state.isChatting = true;
        state.currentRound = 0;
        state.messages = [];
        state.conversationHistory = [];
        state.userParticipated = false;
        state.usedLines = {};

        document.getElementById('btnStartChat').disabled = true;
        document.getElementById('btnStopChat').disabled = false;
        const mobileBtnStart = document.getElementById('mobileBtnStart');
        const mobileBtnStop = document.getElementById('mobileBtnStop');
        if (mobileBtnStart) mobileBtnStart.disabled = true;
        if (mobileBtnStop) mobileBtnStop.disabled = false;
        setInputEnabled(true);

        setStatus('online', '群雄汇聚...');
        updateRoundCounter();

        // 清空聊天区域
        document.getElementById('chatMessages').innerHTML = '';
        
        const modeText = state.serverMode === 'online' ? '🌐 在线模式（AI驱动）' : '📜 离线模式（预设台词）';
        const names = state.selectedCharacters.map(c => c.name).join('、');
        addSystemMessage(`🏯 群雄汇聚！${names} 已来到华山之巅！（${modeText}）`);
        addSystemMessage(`🗣️ 你可以随时加入对话，大侠们会随机回应你！`);

        // 让大侠们先互相打个招呼
        await characterGreetingRound();
    }



    function stopChat() {
        state.isChatting = false;
        state.isProcessing = false;
        removeTypingIndicator();
        
        document.getElementById('btnStartChat').disabled = false;
        document.getElementById('btnStopChat').disabled = true;
        document.getElementById('btnExport').disabled = state.messages.length === 0;
        const mobileBtnStart = document.getElementById('mobileBtnStart');
        const mobileBtnStop = document.getElementById('mobileBtnStop');
        const mobileBtnExport = document.getElementById('mobileBtnExport');
        if (mobileBtnStart) mobileBtnStart.disabled = false;
        if (mobileBtnStop) mobileBtnStop.disabled = true;
        if (mobileBtnExport) mobileBtnExport.disabled = state.messages.length === 0;
        setInputEnabled(false);
        setStatus('offline', '论剑已毕');

        
        updateSelectedCharacters();
        addSystemMessage('🛑 论剑结束，各位大侠后会有期！');
    }



    // ============================================================
    // 角色打招呼
    // ============================================================
    async function characterGreetingRound() {
        const chars = state.selectedCharacters;
        // 随机选2-3个角色先说话
        const speakingCount = Math.min(3, chars.length);
        const shuffled = [...chars].sort(() => Math.random() - 0.5);
        const speakers = shuffled.slice(0, speakingCount);

        for (const char of speakers) {
            if (!state.isChatting) return;
            await sleep(800 + Math.random() * 1200);
            await generateCharacterResponse(char, '初次见面，打个招呼吧！');
        }
    }

    // ============================================================
    // 生成角色对话（支持离线和在线模式）
    // ============================================================
    async function generateCharacterResponse(char, context) {
        if (!state.isChatting || state.isProcessing) return;

        state.isProcessing = true;
        showTypingIndicator(char);
        setStatus('thinking', `${char.name} 正在思索...`);

        try {
            let text;
            
            if (state.serverMode !== 'online') {
                // 离线模式：使用预设台词
                await sleep(600 + Math.random() * 1000); // 模拟思考延迟
                text = getOfflineLine(char, context);
            } else {
                // 在线模式：调用API
                const systemPrompt = buildSystemPrompt(char);
                const messages = buildConversationMessages(char, context);
                const response = await callAPI(systemPrompt, messages);
                text = response.choices[0].message.content.trim();
            }


            removeTypingIndicator();
            addMessage(char, text);
            
            // 记录对话历史
            state.conversationHistory.push({
                speaker: char.name,
                text: text
            });

        } catch (error) {
            removeTypingIndicator();
            addSystemMessage(`⚠️ ${char.name} 似乎遇到了麻烦：${error.message}`);
        } finally {
            state.isProcessing = false;
            if (state.isChatting) {
                setStatus('online', '群雄汇聚');
            }
        }
    }

    // ============================================================
    // 离线模式 - 获取预设台词
    // ============================================================
    function getOfflineLine(char, context) {
        const lines = OFFLINE_LINES[char.id];
        if (!lines || lines.length === 0) return '...';

        // 初始化已用台词记录
        if (!state.usedLines[char.id]) {
            state.usedLines[char.id] = new Set();
        }

        const usedSet = state.usedLines[char.id];

        // 如果是打招呼场景，优先使用问候语
        if (context && context.includes('打招呼')) {
            const greetings = OFFLINE_GREETINGS[char.id];
            if (greetings) {
                const available = greetings.filter((_, i) => !usedSet.has(`greet_${i}`));
                if (available.length > 0) {
                    const idx = greetings.indexOf(available[Math.floor(Math.random() * available.length)]);
                    usedSet.add(`greet_${idx}`);
                    return greetings[idx];
                }
            }
        }

        // 如果是回应"我"（用户），尝试找一条合适的台词
        if (context && context.includes('请回应「我」')) {
            // 找一条还没用过的台词
            const available = lines.filter((_, i) => !usedSet.has(i));
            if (available.length > 0) {
                const idx = lines.indexOf(available[Math.floor(Math.random() * available.length)]);
                usedSet.add(idx);
                return lines[idx];
            }
        }

        // 随机选一条未用过的台词
        const available = lines.filter((_, i) => !usedSet.has(i));
        if (available.length > 0) {
            const idx = lines.indexOf(available[Math.floor(Math.random() * available.length)]);
            usedSet.add(idx);
            return lines[idx];
        }

        // 所有台词都用过了，重置并随机选一条
        state.usedLines[char.id] = new Set();
        const randomIdx = Math.floor(Math.random() * lines.length);
        state.usedLines[char.id].add(randomIdx);
        return lines[randomIdx];
    }


    function buildSystemPrompt(char) {
        const allCharNames = state.selectedCharacters.map(c => c.name).join('、');
        return `你正在扮演金庸武侠小说中的角色「${char.name}」。

角色背景：${char.background}

说话风格要求：${char.style}

当前在场的其他角色有：${allCharNames}

重要规则：
1. 你必须完全以${char.name}的身份说话，用第一人称"我"
2. 说话要符合角色的性格特点和语言风格，每句话30-80字
3. 可以适当引用原著中的经典台词或梗
4. 要根据对话历史中其他角色说的话来回应，可以点名道姓
5. 不要提及你是AI或语言模型
6. 说话要生动有趣，展现角色个性
7. 如果用户（玩家）说话了，你要回应他/她
8. 注意和其他角色的互动，可以互相调侃、争论或叙旧
9. 每次说话都要不一样，不要重复同样的内容
10. 可以主动向其他角色提问、挑战、或邀请喝酒`;
    }

    function buildConversationMessages(char, context) {
        const messages = [];
        
        // 添加最近15条对话历史作为上下文（增加历史长度）
        const recentHistory = state.conversationHistory.slice(-15);
        for (const entry of recentHistory) {
            if (entry.speaker === char.name) continue; // 不包含自己的话
            messages.push({
                role: 'user',
                content: `${entry.speaker}说：${entry.text}`
            });
        }

        // 添加当前上下文
        if (context) {
            messages.push({
                role: 'user',
                content: context
            });
        }

        // 如果没有历史消息，给个开场提示
        if (messages.length === 0) {
            const otherNames = state.selectedCharacters
                .filter(c => c.id !== char.id)
                .map(c => c.name)
                .join('、');
            messages.push({
                role: 'user',
                content: `你刚来到华山之巅，看到${otherNames}也在场。请说一句话来开启对话，展现你的角色特点。`
            });
        }

        return messages;
    }


    async function callAPI(systemPrompt, messages) {
        const basePath = getBasePath();
        const response = await fetch(basePath + '/api/chat', {

            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ systemPrompt, messages })
        });

        if (response.ok) {
            return await response.json();
        }

        // 后端返回了错误
        const errorData = await response.json();
        if (response.status === 400) {
            throw new Error(errorData.error || '服务器未配置 API Key');
        }
        throw new Error(`代理错误 (${response.status}): ${errorData.error || '未知错误'}`);
    }



    // ============================================================
    // 用户发送消息
    // ============================================================
    async function sendUserMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || !state.isChatting || state.isProcessing) return;

        // 显示用户消息
        const userChar = { id: 'user', name: '我', emoji: '🧑', color: '#d4a84b' };
        addMessage(userChar, text);
        input.value = '';
        input.style.height = 'auto';

        // 记录对话历史
        state.conversationHistory.push({
            speaker: '我',
            text: text
        });

        state.userParticipated = true;

        // 随机选1-2个角色来回应
        const responders = getRandomResponders();
        
        for (const char of responders) {
            if (!state.isChatting) return;
            await sleep(1000 + Math.random() * 1500);
            await generateCharacterResponse(char, `请回应「我」刚才说的话：${text}`);
        }

        // 如果还没达到最大回合数，让角色们继续对话
        if (state.currentRound < state.maxRounds) {
            await continueCharacterChat();
        }
    }

    function getRandomResponders() {
        const chars = state.selectedCharacters;
        const count = Math.min(1 + Math.floor(Math.random() * 2), chars.length);
        const shuffled = [...chars].sort(() => Math.random() - 0.5);
        return shuffled.slice(0, count);
    }

    // ============================================================
    // 角色继续聊天（自动推进）
    // ============================================================
    async function continueCharacterChat() {
        if (!state.isChatting || state.currentRound >= state.maxRounds) return;

        state.currentRound++;
        updateRoundCounter();
        
        addSystemMessage(`📜 第 ${state.currentRound} 回合论剑开始...`);

        // 每个角色轮流说话
        const chars = state.selectedCharacters;
        for (const char of chars) {
            if (!state.isChatting) return;
            
            // 随机决定这个角色是否说话（增加随机性）
            if (Math.random() > 0.7) continue;
            
            await sleep(800 + Math.random() * 1500);
            await generateCharacterResponse(char, '继续和大家聊天，回应刚才的对话。');
        }

        // 检查是否还有下一回合
        if (state.currentRound < state.maxRounds) {
            addSystemMessage(`⏳ 本回合结束，等待下一轮...`);
        } else {
            addSystemMessage(`🏁 ${state.maxRounds} 回合论剑已毕！各位大侠可再发一言，或点击「结束论剑」。`);
            setStatus('online', '论剑已毕');
        }
    }

    // ============================================================
    // 导出聊天记录
    // ============================================================
    function exportChat() {
        if (state.messages.length === 0) {
            addSystemMessage('⚠️ 尚无论剑记录可导出！');
            return;
        }

        // 构建导出内容
        const now = new Date();
        const dateStr = now.toLocaleDateString('zh-CN') + ' ' + now.toLocaleTimeString('zh-CN');
        const charNames = state.selectedCharacters.map(c => c.name).join('、');
        
        let content = '';
        content += '═══════════════════════════════════════════\n';
        content += '        🏯 华山论剑 · 聊天记录\n';
        content += '═══════════════════════════════════════════\n';
        content += `  日期：${dateStr}\n`;
        content += `  参与大侠：${charNames}\n`;
        content += `  回合数：${state.currentRound} / ${state.maxRounds}\n`;
        content += `  模式：${state.serverMode === 'online' ? '🌐 在线模式' : '📜 离线模式'}\n`;
        content += '───────────────────────────────────────────\n\n';

        for (const msg of state.messages) {
            const name = msg.char.name || '我';
            const emoji = msg.char.emoji || '🧑';
            const time = new Date(msg.time).toLocaleTimeString('zh-CN');
            content += `[${time}] ${emoji} ${name}：\n`;
            content += `  ${msg.text}\n\n`;
        }

        content += '───────────────────────────────────────────\n';
        content += '  记录由「金庸群侠聊天室」自动生成\n';
        content += '═══════════════════════════════════════════\n';

        // 创建下载
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `华山论剑录_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        addSystemMessage(`📥 论剑录已导出！共 ${state.messages.length} 条消息。`);
    }

    // ============================================================
    // 手机端 - 角色选择面板
    // ============================================================
    function openMobileCharPanel() {
        const overlay = document.getElementById('mobileCharOverlay');
        overlay.classList.add('active');
        // 同步手机端角色列表
        renderMobileCharacterList();
    }

    function closeMobileCharPanel() {
        document.getElementById('mobileCharOverlay').classList.remove('active');
    }

    function renderMobileCharacterList() {
        const container = document.getElementById('mobileCharacterList');
        container.innerHTML = '';
        CHARACTERS.forEach(char => {
            const card = document.createElement('div');
            card.className = 'character-card';
            card.dataset.id = char.id;
            // 检查是否已选中
            const isSelected = state.selectedCharacters.some(c => c.id === char.id);
            if (isSelected) card.classList.add('selected');
            card.innerHTML = `
                <div class="character-avatar" style="background: ${char.color}33; border-color: ${char.color}66;">
                    ${char.emoji}
                </div>
                <div class="character-info">
                    <div class="character-name">${char.name}</div>
                    <div class="character-title">${char.title}</div>
                </div>
                <input type="checkbox" class="character-checkbox" data-id="${char.id}" ${isSelected ? 'checked' : ''}>
            `;
            card.addEventListener('click', (e) => {
                if (e.target.type !== 'checkbox') {
                    const checkbox = card.querySelector('.character-checkbox');
                    checkbox.checked = !checkbox.checked;
                    checkbox.dispatchEvent(new Event('change'));
                }
            });
            const checkbox = card.querySelector('.character-checkbox');
            checkbox.addEventListener('change', () => {
                card.classList.toggle('selected', checkbox.checked);
                // 同步更新主列表的选中状态
                const mainCheckbox = document.querySelector(`#characterList .character-checkbox[data-id="${char.id}"]`);
                if (mainCheckbox) {
                    mainCheckbox.checked = checkbox.checked;
                    mainCheckbox.dispatchEvent(new Event('change'));
                }
                updateSelectedCharacters();
            });
            container.appendChild(card);
        });
    }

    // ============================================================
    // 工具函数
    // ============================================================
    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }



    // ============================================================
    // 页面加载完成后初始化
    // ============================================================
    document.addEventListener('DOMContentLoaded', init);
</script>
